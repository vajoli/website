<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grommet Tee — VAJOLI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=6">
</head>
<body class="page-inner">

    <div class="grain-overlay"></div>

    <header class="site-header">
        <div class="header-left">
            <a href="index.html" class="site-logo">
                <img src="assets/logo.png" alt="Vajoli">
            </a>
        </div>
        <nav class="site-nav" aria-label="Main navigation">
            <a href="shop.html" class="active">Shop</a>
            <a href="lookbook.html">Lookbook</a>
            <a href="contact.html">Contact</a>
            <a href="https://www.instagram.com/vaj0li/" target="_blank" rel="noopener">Instagram</a>
            <a href="cart.html" class="cart-link">Cart<span class="cart-count"></span></a>
        </nav>
    </header>

    <main>
        <a href="shop.html" class="back-link">&#8592; Shop</a>
        <span class="back-link__rule"></span>
        <div class="product-page">

            <!-- Gallery -->
            <div class="product-gallery">
                <div class="product-gallery__main">
                    <img id="main-product-img"
                         src="assets/products/grommet-tee-front.jpg"
                         alt="Grommet Tee">
                </div>
                <div class="product-gallery__thumbs">
                    <button class="thumb active" onclick="switchProductImage('assets/products/grommet-tee-front.jpg', this)" aria-label="Front view">
                        <img src="assets/products/grommet-tee-front.jpg" alt="Front">
                    </button>
                    <button class="thumb" onclick="switchProductImage('assets/products/grommet-tee-back.jpg', this)" aria-label="Back view">
                        <img src="assets/products/grommet-tee-back.jpg" alt="Back">
                    </button>
                    <!-- Add more detail shots here -->
                </div>
            </div>

            <!-- Info -->
            <div class="product-info">
                <h1 class="product-info__name">Grommet Tee</h1>
                <p class="product-info__price">&#165; 16,000</p>
                <div class="product-info__rule"></div>

                <p class="product-info__desc">
                    Heavyweight cropped tee in black jersey with contrast burgundy trim at collar, cuffs, and hem. Double-layer collar construction with twin silver grommet hardware. Relaxed boxy fit.
                </p>

                <div class="product-info__sizes">
                    <span class="size-label">Size</span>
                    <div class="size-options">
                        <button class="size-btn" onclick="selectSize(this)">XS</button>
                        <button class="size-btn" onclick="selectSize(this)">S</button>
                        <button class="size-btn" onclick="selectSize(this)">M</button>
                        <button class="size-btn" onclick="selectSize(this)">L</button>
                        <button class="size-btn" onclick="selectSize(this)">XL</button>
                    </div>
                </div>

                <button class="btn-add-cart" data-product='{"id":"grommet-tee","name":"Grommet Tee","price":16000,"image":"assets/products/grommet-tee-front.jpg"}'>Add to cart</button>
            </div>

        </div>
    </main>

    <footer class="site-footer">
        <span class="site-footer__copy">© Vajoli 2026</span>
        <ul class="site-footer__links">
            <li><a href="https://www.instagram.com/vaj0li/" target="_blank" rel="noopener">Instagram</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </footer>

    <div id="spotify-mini"></div>
    <script src="js/main.js?v=7"></script>
</body>
</html>
