<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop — VAJOLI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=6">
</head>
<body class="page-inner">

    <div class="grain-overlay"></div>

    <header class="site-header">
        <div class="header-left">
            <a href="index.html" class="site-logo">
                <img src="assets/logo.png" alt="Vajoli">
            </a>
        </div>
        <nav class="site-nav" aria-label="Main navigation">
            <a href="shop.html" class="active">Shop</a>
            <a href="lookbook.html">Lookbook</a>
            <a href="contact.html">Contact</a>
            <a href="https://www.instagram.com/vaj0li/" target="_blank" rel="noopener">Instagram</a>
            <a href="cart.html" class="cart-link">Cart<span class="cart-count"></span></a>
        </nav>
    </header>

    <main>
        <div class="page-heading">
            <h1>Shop</h1>
            <div class="page-heading__rule"></div>
        </div>

        <div class="shop-main">

            <!-- Product Grid -->
            <div class="product-grid">

                <article class="product-card">
                    <a href="barrel-denim.html" class="product-card__img-wrap">
                        <div class="product-card__img">
                            <img class="img-front" src="assets/products/barrel-denim-front.jpg" alt="Barrel Denim" loading="lazy">
                            <img class="img-back"  src="assets/products/barrel-denim-back.jpg"  alt="Barrel Denim — Back" loading="lazy">
                            <div class="product-card__coming-soon">Coming Soon</div>
                        </div>
                    </a>
                    <div class="product-card__info">
                        <span class="product-card__name">Barrel Denim</span>
                        <span class="product-card__price">&#165; 32,000</span>
                    </div>
                </article>

                <article class="product-card">
                    <a href="grommet-tee.html" class="product-card__img-wrap">
                        <div class="product-card__img">
                            <img class="img-front" src="assets/products/grommet-tee-front.jpg" alt="Grommet Tee" loading="lazy">
                            <img class="img-back"  src="assets/products/grommet-tee-back.jpg"  alt="Grommet Tee — Back" loading="lazy">
                            <div class="product-card__coming-soon">Coming Soon</div>
                        </div>
                    </a>
                    <div class="product-card__info">
                        <span class="product-card__name">Grommet Tee</span>
                        <span class="product-card__price">&#165; 16,000</span>
                    </div>
                </article>

                <article class="product-card">
                    <a href="boxer.html" class="product-card__img-wrap">
                        <div class="product-card__img">
                            <img class="img-front" src="assets/products/boxer-pink.png" alt="Boxer Shorts" loading="lazy">
                            <img class="img-back"  src="assets/products/boxer-black.png" alt="Boxer Shorts — Black" loading="lazy">
                        </div>
                    </a>
                    <div class="product-card__info">
                        <span class="product-card__name">Boxer Shorts</span>
                        <span class="product-card__price">&#165; 5,000</span>
                    </div>
                </article>

            </div>
        </div>
    </main>

    <footer class="site-footer">
        <span class="site-footer__copy">© Vajoli 2026</span>
        <ul class="site-footer__links">
            <li><a href="https://www.instagram.com/vaj0li/" target="_blank" rel="noopener">Instagram</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </footer>

    <div id="spotify-mini"></div>
    <script src="js/main.js?v=7"></script>
</body>
</html>
