<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAJOLI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body class="page-home">

    <div class="grain-overlay"></div>

    <main class="hero">
        <!-- Background: replace with your editorial photo in style.css .hero__bg -->
        <div class="hero__bg"></div>
        <div class="hero__frame"></div>

        <div class="hero__content">
            <!-- Logo: place assets/logo.png here if you want the image instead of text -->
            <h1 class="hero__brand">Vajoli</h1>

            <div class="hero__rule"></div>

            <div class="hero__timestamp" id="timestamp"></div>

            <nav class="hero__nav" aria-label="Main navigation">
                <a href="shop.html">Shop</a>
                <a href="lookbook.html">Lookbook</a>
                <a href="contact.html">Contact</a>
                <a href="https://www.instagram.com/vaj0li/" target="_blank" rel="noopener">Instagram</a>
            </nav>

            <form class="hero__email" action="#" method="post" novalidate>
                <label class="hero__email-label" for="hero-email">Stay in the loop</label>
                <div class="hero__email-row">
                    <input
                        id="hero-email"
                        type="email"
                        name="email"
                        placeholder="your@email.com"
                        autocomplete="email"
                        required
                    >
                    <button type="submit" aria-label="Subscribe">→</button>
                </div>
            </form>
        </div>

        <!-- Monthly Playlist — left panel -->
        <div class="hero__playlist">
            <span class="hero__playlist-label">Now Playing</span>
            <span class="hero__playlist-month">May 2026</span>
            <div class="hero__playlist-embed">
                <iframe
                    src="https://open.spotify.com/embed/playlist/5VkpHDVp1KGWpnn2luR92s?utm_source=generator&theme=0"
                    width="100%"
                    height="300"
                    frameborder="0"
                    allowfullscreen
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                    loading="lazy">
                </iframe>
            </div>
            <a href="https://open.spotify.com/playlist/5VkpHDVp1KGWpnn2luR92s"
               target="_blank"
               rel="noopener"
               class="hero__playlist-save">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="width:13px;height:13px;fill:currentColor;flex-shrink:0">
                    <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
                </svg>
                Save to Spotify
            </a>
        </div>

        <div class="hero__socials">
            <a href="https://www.instagram.com/vaj0li/" target="_blank" rel="noopener">IG</a>
            <a href="https://www.tiktok.com/@vaj0li"   target="_blank" rel="noopener">TK</a>
        </div>
    </main>

    <script src="js/main.js?v=7"></script>
</body>
</html>
